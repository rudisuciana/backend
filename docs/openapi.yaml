openapi: 3.0.3
info:
  title: PPOB Backend Blueprint API
  version: 1.0.0
  description: API blueprint for website (public) and user channels (x-api-key authorization based on users.apikey and whitelisted IP).
servers:
  - url: http://localhost:3000
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    WebsiteProduct:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        category:
          type: string
        price:
          type: number
        adminFee:
          type: number
        isActive:
          type: boolean
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        balance:
          type: number
        status:
          type: string
        avatar:
          type: string
          nullable: true
    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
paths:
  /health:
    get:
      tags: [System]
      summary: Check service health (MySQL and Redis)
      responses:
        '200':
          description: All services up
        '503':
          description: One or more services down
  /api/v1/website/ping:
    get:
      tags: [Website]
      summary: Basic connectivity test for website client
      responses:
        '200':
          description: Website API reachable
  /api/v1/website/products:
    get:
      tags: [Website]
      summary: List active PPOB products
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebsiteProduct'
  /api/v1/user/ping:
    get:
      tags: [User]
      security:
        - ApiKeyAuth: []
      summary: Basic connectivity test for user client (requires API key and whitelisted IP)
      responses:
        '200':
          description: User API reachable
        '403':
          description: Invalid API key or IP is not allowed
  /api/v1/user/profile:
    get:
      tags: [User]
      security:
        - ApiKeyAuth: []
      summary: Get current user account info by x-api-key and whitelisted IP (for information and transaction preparation)
      responses:
        '200':
          description: User profile found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UserProfile'
        '404':
          description: User not found
        '403':
          description: Invalid API key or IP is not allowed
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register manual user with Gmail and send OTP to email
      responses:
        '201':
          description: Registration successful
        '400':
          description: Invalid payload
  /api/v1/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP for manual registration
      responses:
        '200':
          description: OTP verified
        '400':
          description: Invalid OTP or payload
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login using email or username and password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid credentials
  /api/v1/auth/refresh-token:
    post:
      tags: [Auth]
      summary: Refresh access token using refresh token
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AuthTokens'
  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Send forgot-password OTP to user email
      responses:
        '200':
          description: OTP process accepted
  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using email OTP
      responses:
        '200':
          description: Password reset successful
  /api/v1/auth/google/register:
    post:
      tags: [Auth]
      summary: Register using Google account (Gmail only)
      responses:
        '201':
          description: Google registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AuthTokens'
  /api/v1/auth/google/login:
    post:
      tags: [Auth]
      summary: Login using Google account
      responses:
        '200':
          description: Google login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/AuthTokens'
